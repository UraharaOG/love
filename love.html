<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на киновечер 🎬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background: linear-gradient(145deg, #0b0e14 0%, #1a1428 50%, #231537 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Звездное небо */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10px 20px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 30px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 150px 120px, #ffd700, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 230px 180px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 320px 250px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 400px 90px, #87ceeb, rgba(0,0,0,0));
            background-repeat: repeat;
            opacity: 0.6;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        .card {
            background: rgba(25, 20, 35, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 3px rgba(255, 215, 0, 0.5);
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            z-index: 20;
            position: relative;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        h1 {
            font-size: 3.5rem;
            color: #ffd700;
            margin-bottom: 15px;
            font-weight: 800;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1.8rem;
            color: #e0b0ff;
            margin-bottom: 30px;
            font-style: italic;
        }

        .date-block {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #0b0e14;
            padding: 25px 40px;
            border-radius: 80px;
            display: inline-block;
            font-weight: 900;
            font-size: 3rem;
            margin: 20px 0 30px;
            box-shadow: 0 15px 0 #b8860b, 0 0 50px #ffd700;
            border: 3px solid white;
            letter-spacing: 5px;
        }

        .time {
            font-size: 2.5rem;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 15px #ffd700;
        }

        .popcorn {
            font-size: 4rem;
            margin: 25px 0;
            animation: shake 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px #ffd700);
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px 0 30px;
            flex-wrap: wrap;
            position: relative;
            min-height: 100px;
        }

        .btn {
            border: none;
            padding: 20px 50px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 70px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            border: 3px solid white;
            position: relative;
            z-index: 30;
        }

        .btn-accept {
            background: #28a745;
            color: white;
            box-shadow: 0 10px 0 #166b2c, 0 0 30px #28a745;
        }

        .btn-accept:hover {
            background: #34ce57;
            transform: scale(1.05);
            box-shadow: 0 15px 30px #28a745;
        }

        .btn-no {
            background: #6c757d;
            color: white;
            box-shadow: 0 10px 0 #343a40;
            transition: all 0.2s ease;
        }

        .btn-no-hide {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #funMessage {
            font-size: 1.8rem;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 60px;
            margin: 25px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffd700;
            backdrop-filter: blur(5px);
            font-weight: 500;
        }

        footer {
            margin-top: 20px;
            color: #a89ccf;
            font-size: 1.3rem;
            opacity: 0.9;
        }

        .confirmation-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .confirmation-message {
            font-size: 2.5rem;
            color: #ffd700;
            background: rgba(25, 20, 35, 0.95);
            padding: 50px;
            border-radius: 80px;
            border: 4px solid #ffd700;
            box-shadow: 0 0 70px rgba(255, 215, 0, 0.5);
            line-height: 1.5;
        }

        .reset-btn {
            background: transparent;
            color: #ffd700;
            border: 4px solid #ffd700;
            padding: 20px 45px;
            border-radius: 70px;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .reset-btn:hover {
            background: #ffd700;
            color: #0b0e14;
            box-shadow: 0 0 40px #ffd700;
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="card">
        <!-- Основной экран -->
        <div id="invitationScreen">
            <h1>🎬 КИНО 🎬</h1>
            <div class="subtitle">онлайн-кинотеатр для двоих</div>
            
            <div class="date-block">
                13 МАРТА
            </div>

            <div class="time">
                ⏰ 21:00
            </div>

            <div class="popcorn">
                🍿 🥤 🎬 ✨
            </div>
            
            <div class="buttons">
                <button class="btn btn-accept" id="acceptBtn">✅ Пойду!</button>
                <button class="btn btn-no" id="noBtn">❌ Не в этот раз</button>
            </div>

            <div id="funMessage">
                💫 13 марта в 21:00
            </div>

            <footer>
                ✨ ✨ ✨
            </footer>
        </div>

        <!-- Экран подтверждения -->
        <div id="confirmationScreen" class="confirmation-screen">
            <div class="popcorn">🎉✨🎬</div>
            <div class="confirmation-message" id="confirmationMessage"></div>
            <div class="date-block" style="font-size: 2.5rem;">13 МАРТА 21:00</div>
            <button class="reset-btn" id="resetBtn">💫 Заново</button>
        </div>
    </div>

    <script>
        (function() {
            const invitationScreen = document.getElementById('invitationScreen');
            const confirmationScreen = document.getElementById('confirmationScreen');
            const acceptBtn = document.getElementById('acceptBtn');
            const noBtn = document.getElementById('noBtn');
            const funMessage = document.getElementById('funMessage');
            const confirmationMessage = document.getElementById('confirmationMessage');
            const resetBtn = document.getElementById('resetBtn');
            const card = document.querySelector('.card');

            let noClickCount = 0;

            const acceptMessages = [
                "🎉 Ура! 13 марта в 21:00 встретимся в онлайне! Жду! 💕",
                "✨ Договорились! Я уже выбрал место в виртуальном зале! 🍿",
                "🌟 Отлично! 13 марта в 21:00 — теперь это особенная дата!",
                "💖 Ты сделала мой вечер! До встречи в кино! 🎬"
            ];

            const noMessages = [
                "❌ Не туда нажала!",
                "🤔 Подумай еще...",
                "😏 Сюда нельзя!",
                "🎬 Только ДА!",
                "✨ А если найду?",
                "🌟 Не получится убежать ❤️",
                "🍿 Попробуй еще разок"
            ];

            function showConfirmation(message) {
                confirmationMessage.innerText = message;
                invitationScreen.style.display = 'none';
                confirmationScreen.style.display = 'flex';
            }

            acceptBtn.addEventListener('click', function() {
                const randomIndex = Math.floor(Math.random() * acceptMessages.length);
                showConfirmation(acceptMessages[randomIndex]);
            });

            noBtn.addEventListener('click', function(e) {
                e.preventDefault();
                noClickCount++;

                if (noClickCount === 3) {
                    // На третьем нажатии грустный смайлик
                    funMessage.innerText = "😢 Ну пожалуйста... очень жду тебя 13 марта в 21:00";
                    noBtn.classList.add('btn-no-hide');
                } else if (noClickCount > 3) {
                    // После третьего нажатия кнопка исчезает
                    noBtn.style.display = 'none';
                    if (noClickCount === 4) {
                        funMessage.innerText = "😭 Ты разбиваешь мне сердце... 13 марта в 21:00";
                    } else if (noClickCount >= 5) {
                        funMessage.innerText = "💔 ...";
                    }
                } else {
                    // Первые два нажатия - убегание и сообщения
                    const randomIndex = Math.floor(Math.random() * noMessages.length);
                    funMessage.innerText = noMessages[randomIndex];
                    
                    // Убегание кнопки
                    const maxShift = 200;
                    const randomX = (Math.random() - 0.5) * maxShift * 2;
                    const randomY = (Math.random() - 0.5) * maxShift;
                    
                    noBtn.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.9)`;
                    noBtn.style.transition = 'transform 0.2s ease';
                    
                    noBtn.style.fontSize = '1.8rem';
                    noBtn.style.padding = '18px 40px';
                }
            });

            // При наведении тоже убегает (для десктопа)
            noBtn.addEventListener('mouseenter', function() {
                if (noClickCount < 2) {
                    const randomX = (Math.random() - 0.5) * 150;
                    const randomY = (Math.random() - 0.5) * 150;
                    noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
                }
            });

            resetBtn.addEventListener('click', function() {
                confirmationScreen.style.display = 'none';
                invitationScreen.style.display = 'block';
                
                // Сброс кнопки "Нет"
                noBtn.style.display = 'inline-block';
                noBtn.classList.remove('btn-no-hide');
                noBtn.style.transform = 'translate(0, 0) scale(1)';
                noBtn.style.fontSize = '2rem';
                noBtn.style.padding = '20px 50px';
                
                noClickCount = 0;
                funMessage.innerText = '💫 13 марта в 21:00';

                // Анимация карточки
                card.style.transform = 'scale(0.95)';
                setTimeout(() => card.style.transform = 'scale(1)', 200);
            });
        })();
    </script>
</body>
</html>
