<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Приглашение на киновечер 🎬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0e14 0%, #1a1428 50%, #231537 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 8px;
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                radial-gradient(2px 2px at 10px 20px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 30px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 150px 120px, #ffd700, rgba(0,0,0,0));
            background-repeat: repeat;
            opacity: 0.6;
            animation: twinkle 4s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        .card {
            background: rgba(25, 20, 35, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 36px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 215, 0, 0.4);
            padding: 1.2rem 1rem;
            max-width: 340px;
            width: 100%;
            text-align: center;
            z-index: 10;
            position: relative;
            border: 1px solid rgba(255, 215, 0, 0.2);
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 4px;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1rem;
            color: #e0b0ff;
            margin-bottom: 10px;
            font-style: italic;
        }

        .date-block {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #0b0e14;
            padding: 12px 16px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 900;
            font-size: 1.8rem;
            margin: 8px 0 12px;
            box-shadow: 0 6px 0 #b8860b, 0 0 20px #ffd700;
            border: 2px solid white;
            letter-spacing: 1px;
            width: auto;
        }

        .time {
            font-size: 1.6rem;
            color: #ffd700;
            margin: 8px 0;
            text-shadow: 0 0 8px #ffd700;
        }

        .popcorn {
            font-size: 2.5rem;
            margin: 8px 0 10px;
            animation: shake 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px #ffd700);
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(6deg); }
            75% { transform: rotate(-6deg); }
        }

        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 16px 0 12px;
            position: relative;
            min-height: 130px;
            width: 100%;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 2px solid white;
            width: 100%;
            max-width: 240px;
            margin: 0 auto;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .btn-accept {
            background: #28a745;
            color: white;
            box-shadow: 0 4px 0 #166b2c, 0 0 15px #28a745;
        }

        .btn-accept:active {
            transform: scale(0.97);
            background: #34ce57;
        }

        .btn-no {
            background: #6c757d;
            color: white;
            box-shadow: 0 4px 0 #343a40;
            position: relative;
            touch-action: none;
        }

        .btn-no:active {
            transform: scale(0.97);
        }

        .btn-no-hide {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #funMessage {
            font-size: 1.2rem;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            border-radius: 36px;
            margin: 8px 0 6px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffd700;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            font-weight: 500;
            line-height: 1.3;
            word-break: break-word;
        }

        footer {
            margin-top: 8px;
            color: #a89ccf;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .confirmation-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .confirmation-message {
            font-size: 1.5rem;
            color: #ffd700;
            background: rgba(25, 20, 35, 0.95);
            padding: 20px 16px;
            border-radius: 36px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            line-height: 1.4;
            width: 100%;
            word-break: break-word;
        }

        .reset-btn {
            background: transparent;
            color: #ffd700;
            border: 3px solid #ffd700;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            width: auto;
            min-width: 130px;
            -webkit-tap-highlight-color: transparent;
        }

        .reset-btn:active {
            background: #ffd700;
            color: #0b0e14;
        }

        /* Адаптация для совсем маленьких экранов (Telegram WebView) */
        @media (max-width: 360px) {
            .card {
                padding: 1rem 0.8rem;
                border-radius: 30px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .date-block {
                font-size: 1.5rem;
                padding: 10px 14px;
            }
            .time {
                font-size: 1.4rem;
            }
            .popcorn {
                font-size: 2.2rem;
            }
            .btn {
                font-size: 1.2rem;
                padding: 10px 16px;
                max-width: 200px;
            }
            #funMessage {
                font-size: 1.1rem;
                padding: 10px;
                min-height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="card">
        <!-- Основной экран -->
        <div id="invitationScreen">
            <h1>🎬 КИНО 🎬</h1>
            <div class="subtitle">онлайн вдвоём</div>
            
            <div class="date-block">
                13 МАРТА
            </div>

            <div class="time">
                21:00
            </div>

            <div class="popcorn">
                🍿🎬✨
            </div>
            
            <div class="buttons">
                <button class="btn btn-accept" id="acceptBtn">✅ Пойду!</button>
                <button class="btn btn-no" id="noBtn">❌ Не в этот раз</button>
            </div>

            <div id="funMessage">
                💫 13 марта, 21:00
            </div>

            <footer>
                ✨
            </footer>
        </div>

        <!-- Экран подтверждения -->
        <div id="confirmationScreen" class="confirmation-screen">
            <div class="popcorn">🎉✨</div>
            <div class="confirmation-message" id="confirmationMessage"></div>
            <div class="date-block" style="font-size: 1.4rem;">13 МАРТА 21:00</div>
            <button class="reset-btn" id="resetBtn">💫 Заново</button>
        </div>
    </div>

    <script>
        (function() {
            const invitationScreen = document.getElementById('invitationScreen');
            const confirmationScreen = document.getElementById('confirmationScreen');
            const acceptBtn = document.getElementById('acceptBtn');
            const noBtn = document.getElementById('noBtn');
            const funMessage = document.getElementById('funMessage');
            const confirmationMessage = document.getElementById('confirmationMessage');
            const resetBtn = document.getElementById('resetBtn');
            const card = document.querySelector('.card');

            let noClickCount = 0;
            let noBtnPosition = { x: 0, y: 0 };

            const acceptMessages = [
                "🎉 Ура! Жду 13 марта в 21:00! 💕",
                "✨ Договорились! Попкорн готов! 🍿",
                "🌟 13 марта — особенный вечер!",
                "💖 До встречи в кино! 🎬"
            ];

            const noMessages = [
                "❌ Не туда!",
                "🤔 Подумай...",
                "😏 Сюда нельзя!",
                "🎬 Только ДА!",
                "✨ А если найду?"
            ];

            function showConfirmation(message) {
                confirmationMessage.innerText = message;
                invitationScreen.style.display = 'none';
                confirmationScreen.style.display = 'flex';
            }

            acceptBtn.addEventListener('click', function() {
                const randomIndex = Math.floor(Math.random() * acceptMessages.length);
                showConfirmation(acceptMessages[randomIndex]);
            });

            noBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                noClickCount++;

                if (noClickCount === 3) {
                    funMessage.innerText = "😢 Ну пожалуйста... 13 марта в 21:00";
                    noBtn.classList.add('btn-no-hide');
                } else if (noClickCount > 3) {
                    noBtn.style.display = 'none';
                    if (noClickCount === 4) {
                        funMessage.innerText = "😭 Ты разбиваешь мне сердце...";
                    } else if (noClickCount >= 5) {
                        funMessage.innerText = "💔";
                    }
                } else {
                    const randomIndex = Math.floor(Math.random() * noMessages.length);
                    funMessage.innerText = noMessages[randomIndex];
                    
                    // Случайное перемещение в пределах карточки
                    const maxShift = 80;
                    const randomX = (Math.random() - 0.5) * maxShift * 2;
                    const randomY = (Math.random() - 0.5) * maxShift;
                    
                    noBtn.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.9)`;
                    noBtn.style.transition = 'transform 0.15s ease';
                }
            });

            // Полностью отключаем mouseenter для мобильных устройств
            noBtn.addEventListener('touchstart', function(e) {
                // Только для мобильных, ничего не делаем
            });

            resetBtn.addEventListener('click', function() {
                confirmationScreen.style.display = 'none';
                invitationScreen.style.display = 'block';
                
                noBtn.style.display = 'inline-block';
                noBtn.classList.remove('btn-no-hide');
                noBtn.style.transform = 'translate(0, 0) scale(1)';
                noBtn.style.transition = 'transform 0.2s ease';
                
                noClickCount = 0;
                funMessage.innerText = '💫 13 марта, 21:00';

                card.style.transform = 'scale(0.98)';
                setTimeout(() => card.style.transform = 'scale(1)', 150);
            });

            // Адаптация для Telegram WebView
            if (navigator.userAgent.includes('Telegram')) {
                document.body.style.padding = '4px';
            }
        })();
    </script>
</body>
</html>
