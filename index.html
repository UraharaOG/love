<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Приглашение на киновечер 🎬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            background: linear-gradient(145deg, #0b0e14 0%, #1a1428 50%, #231537 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 12px;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10px 20px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 30px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 150px 120px, #ffd700, rgba(0,0,0,0));
            background-repeat: repeat;
            opacity: 0.6;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        .card {
            background: rgba(25, 20, 35, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 3px rgba(255, 215, 0, 0.5);
            padding: 1.8rem 1.5rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            z-index: 20;
            position: relative;
            border: 1px solid rgba(255, 215, 0, 0.3);
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            color: #ffd700;
            margin-bottom: 10px;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #e0b0ff;
            margin-bottom: 20px;
            font-style: italic;
        }

        .date-block {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #0b0e14;
            padding: 15px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: 900;
            font-size: 2.2rem;
            margin: 15px 0 20px;
            box-shadow: 0 8px 0 #b8860b, 0 0 30px #ffd700;
            border: 2px solid white;
            letter-spacing: 2px;
            width: auto;
        }

        .time {
            font-size: 2rem;
            color: #ffd700;
            margin: 15px 0;
            text-shadow: 0 0 10px #ffd700;
        }

        .popcorn {
            font-size: 3rem;
            margin: 15px 0;
            animation: shake 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px #ffd700);
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg); }
        }

        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 25px 0 20px;
            position: relative;
            min-height: 140px;
            width: 100%;
        }

        .btn {
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 2px solid white;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-accept {
            background: #28a745;
            color: white;
            box-shadow: 0 6px 0 #166b2c, 0 0 20px #28a745;
        }

        .btn-accept:active {
            transform: scale(0.98);
            background: #34ce57;
        }

        .btn-no {
            background: #6c757d;
            color: white;
            box-shadow: 0 6px 0 #343a40;
            position: relative;
            touch-action: pan-x pan-y;
        }

        .btn-no:active {
            transform: scale(0.98);
        }

        .btn-no-hide {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #funMessage {
            font-size: 1.4rem;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 40px;
            margin: 15px 0 10px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffd700;
            backdrop-filter: blur(5px);
            font-weight: 500;
            line-height: 1.4;
            word-break: break-word;
        }

        footer {
            margin-top: 15px;
            color: #a89ccf;
            font-size: 1rem;
            opacity: 0.9;
        }

        .confirmation-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .confirmation-message {
            font-size: 1.8rem;
            color: #ffd700;
            background: rgba(25, 20, 35, 0.95);
            padding: 25px 20px;
            border-radius: 40px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            line-height: 1.5;
            width: 100%;
        }

        .reset-btn {
            background: transparent;
            color: #ffd700;
            border: 3px solid #ffd700;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            width: auto;
            min-width: 150px;
        }

        .reset-btn:active {
            background: #ffd700;
            color: #0b0e14;
        }

        @media (max-width: 380px) {
            .card {
                padding: 1.5rem 1rem;
            }
            h1 {
                font-size: 2rem;
            }
            .date-block {
                font-size: 1.8rem;
                padding: 12px 15px;
            }
            .time {
                font-size: 1.6rem;
            }
            .btn {
                font-size: 1.3rem;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="card">
        <!-- Основной экран -->
        <div id="invitationScreen">
            <h1>🎬 КИНО 🎬</h1>
            <div class="subtitle">онлайн-кинотеатр для двоих</div>
            
            <div class="date-block">
                13 МАРТА
            </div>

            <div class="time">
                ⏰ 21:00
            </div>

            <div class="popcorn">
                🍿 🥤 🎬
            </div>
            
            <div class="buttons">
                <button class="btn btn-accept" id="acceptBtn">✅ Пойду!</button>
                <button class="btn btn-no" id="noBtn">❌ Не в этот раз</button>
            </div>

            <div id="funMessage">
                💫 13 марта в 21:00
            </div>

            <footer>
                ✨ ✨ ✨
            </footer>
        </div>

        <!-- Экран подтверждения -->
        <div id="confirmationScreen" class="confirmation-screen">
            <div class="popcorn">🎉✨🎬</div>
            <div class="confirmation-message" id="confirmationMessage"></div>
            <div class="date-block" style="font-size: 1.8rem;">13 МАРТА 21:00</div>
            <button class="reset-btn" id="resetBtn">💫 Заново</button>
        </div>
    </div>

    <script>
        (function() {
            const invitationScreen = document.getElementById('invitationScreen');
            const confirmationScreen = document.getElementById('confirmationScreen');
            const acceptBtn = document.getElementById('acceptBtn');
            const noBtn = document.getElementById('noBtn');
            const funMessage = document.getElementById('funMessage');
            const confirmationMessage = document.getElementById('confirmationMessage');
            const resetBtn = document.getElementById('resetBtn');
            const card = document.querySelector('.card');

            let noClickCount = 0;

            const acceptMessages = [
                "🎉 Ура! 13 марта в 21:00 жду! 💕",
                "✨ Договорились! Попкорн готов! 🍿",
                "🌟 13 марта в 21:00 — особенная дата!",
                "💖 До встречи в кино! 🎬"
            ];

            const noMessages = [
                "❌ Не туда нажала!",
                "🤔 Подумай еще...",
                "😏 Сюда нельзя!",
                "🎬 Только ДА!",
                "✨ А если найду?"
            ];

            function showConfirmation(message) {
                confirmationMessage.innerText = message;
                invitationScreen.style.display = 'none';
                confirmationScreen.style.display = 'flex';
            }

            acceptBtn.addEventListener('click', function() {
                const randomIndex = Math.floor(Math.random() * acceptMessages.length);
                showConfirmation(acceptMessages[randomIndex]);
            });

            noBtn.addEventListener('click', function(e) {
                e.preventDefault();
                noClickCount++;

                if (noClickCount === 3) {
                    funMessage.innerText = "😢";
                    noBtn.classList.add('btn-no-hide');
                } else if (noClickCount > 3) {
                    noBtn.style.display = 'none';
                    if (noClickCount === 4) {
                        funMessage.innerText = "😭 Ты разбиваешь мне сердце...";
                    } else if (noClickCount >= 5) {
                        funMessage.innerText = "💔 ...";
                    }
                } else {
                    const randomIndex = Math.floor(Math.random() * noMessages.length);
                    funMessage.innerText = noMessages[randomIndex];
                    
                    const maxShift = 120;
                    const randomX = (Math.random() - 0.5) * maxShift * 2;
                    const randomY = (Math.random() - 0.5) * maxShift;
                    
                    noBtn.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.9)`;
                    noBtn.style.transition = 'transform 0.2s ease';
                }
            });

            resetBtn.addEventListener('click', function() {
                confirmationScreen.style.display = 'none';
                invitationScreen.style.display = 'block';
                
                noBtn.style.display = 'inline-block';
                noBtn.classList.remove('btn-no-hide');
                noBtn.style.transform = 'translate(0, 0) scale(1)';
                
                noClickCount = 0;
                funMessage.innerText = '💫 13 марта в 21:00';

                card.style.transform = 'scale(0.98)';
                setTimeout(() => card.style.transform = 'scale(1)', 150);
            });
        })();
    </script>
</body>
</html>
